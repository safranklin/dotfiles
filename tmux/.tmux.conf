# tmux.conf — Gruvbox theme with pill-shaped tabs
# No framework, no dependencies. Just tmux.

# ── Terminal ──────────────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
set -ga terminal-overrides ",xterm*:Tc"
set -s escape-time 10
set -g focus-events on
set -g set-titles on
set -g set-titles-string "#W"

# ── General ───────────────────────────────────────────────────────────
set -g history-limit 10000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g mouse on
set -g status-interval 15

# ── Prefix ────────────────────────────────────────────────────────────
set -g prefix C-b
set -g prefix2 C-a
bind C-b send-prefix
bind C-a send-prefix -2

# ── Copy mode ─────────────────────────────────────────────────────────
set -s copy-command "pbcopy"

# ── Key bindings ──────────────────────────────────────────────────────
bind r source-file ~/.tmux.conf \; display-message "Config reloaded!"

# Split panes with arrow keys
bind Left split-window -h -c "#{pane_current_path}" \; select-pane -L
bind Right split-window -h -c "#{pane_current_path}"
bind Up split-window -v -c "#{pane_current_path}" \; select-pane -U
bind Down split-window -v -c "#{pane_current_path}"

# Navigate panes (no prefix)
bind -n S-Left select-pane -L
bind -n S-Right select-pane -R
bind -n S-Up select-pane -U
bind -n S-Down select-pane -D

# Resize panes
bind -r C-Left resize-pane -L 5
bind -r C-Right resize-pane -R 5
bind -r C-Up resize-pane -U 5
bind -r C-Down resize-pane -D 5

# New windows/panes retain current path
bind c new-window -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# ── Gruvbox palette (regular, matches starship.toml) ─────────────────
# bg0=#282828  bg1=#3c3836  bg3=#665c54  fg0=#fbf1c7
# red=#cc241d  green=#98971a  yellow=#d79921  blue=#458588
# aqua=#689d6a  orange=#d65d0e  purple=#b16286

# ── Panes ─────────────────────────────────────────────────────────────
setw -g pane-border-style "fg=#3c3836"
set -g pane-active-border-style "fg=#d65d0e"
set -g pane-border-lines double
set -g pane-border-indicators both
set -g display-panes-colour "#d65d0e"
set -g display-panes-active-colour "#d65d0e"

# Dim inactive panes — active pane stays normal brightness
set -g window-style "bg=#242424"
set -g window-active-style "bg=#282828"

# ── Messages & mode ──────────────────────────────────────────────────
set -g message-style "fg=#fbf1c7,bg=#d79921,bold"
set -g message-command-style "fg=#fbf1c7,bg=#98971a,bold"
setw -g mode-style "fg=#fbf1c7,bg=#d79921,bold"
setw -g clock-mode-colour "#d65d0e"
setw -g clock-mode-style 24

# ── Status bar ────────────────────────────────────────────────────────
set -g status-style "fg=#fbf1c7,bg=#282828"
set -g status-left-length 80
set -g status-right-length 100

set -g status-left "#[fg=#d65d0e,bg=#282828]#[fg=#fbf1c7,bg=#d65d0e,bold] 󰘧 #[fg=#d65d0e,bg=#d79921]#[fg=#fbf1c7,bg=#d79921] 󰥔 %R #[fg=#d79921,bg=#282828] "
set -g status-right "#[fg=#3c3836,bg=#282828]#[fg=#fbf1c7,bg=#3c3836] 󰅐 #(~/.config/tmux/uptime.sh) #[fg=#458588,bg=#3c3836]#[fg=#fbf1c7,bg=#458588] 󰁹 #(pmset -g batt | grep -Eo '[0-9]+%%') #[fg=#d65d0e,bg=#458588]#[fg=#fbf1c7,bg=#d65d0e]  #(whoami) #[fg=#d65d0e,bg=#282828]"

# ── Window tabs (pills) ──────────────────────────────────────────────
setw -g window-status-separator ""
setw -g window-status-style "fg=#fbf1c7,bg=#282828"
setw -g window-status-current-style "fg=#fbf1c7,bg=#282828"
setw -g window-status-activity-style "fg=#d79921,bg=#282828,bold"
setw -g window-status-bell-style "fg=#cc241d,bg=#282828,bold"
setw -g window-status-last-style "fg=#458588,bg=#282828"

setw -g window-status-format " #[fg=#3c3836,bg=#282828]#[fg=#fbf1c7,bg=#3c3836] #I #[fg=#3c3836,bg=#665c54]#[fg=#fbf1c7,bg=#665c54] #W #[fg=#665c54,bg=#282828] "
setw -g window-status-current-format " #[fg=#d65d0e,bg=#282828]#[fg=#fbf1c7,bg=#d65d0e,bold] #I #[fg=#d65d0e,bg=#689d6a]#[fg=#fbf1c7,bg=#689d6a,bold] #W #[fg=#689d6a,bg=#282828] "
