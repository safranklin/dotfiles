# tmux.conf вҖ” Gruvbox theme with pill-shaped tabs
# No framework, no dependencies. Just tmux.

# в”Җв”Җ Terminal в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
set -ga terminal-overrides ",xterm*:Tc"
set -s escape-time 10
set -g focus-events on
set -g set-titles on
set -g set-titles-string "#W"

# в”Җв”Җ General в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
set -g history-limit 10000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g mouse on
set -g status-interval 15

# в”Җв”Җ Prefix в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
set -g prefix C-b
set -g prefix2 C-a
bind C-b send-prefix
bind C-a send-prefix -2

# в”Җв”Җ Copy mode в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
set -s copy-command "pbcopy"

# в”Җв”Җ Key bindings в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
bind r source-file ~/.tmux.conf \; display-message "Config reloaded!"

# Split panes with arrow keys
bind Left split-window -h -c "#{pane_current_path}" \; select-pane -L
bind Right split-window -h -c "#{pane_current_path}"
bind Up split-window -v -c "#{pane_current_path}" \; select-pane -U
bind Down split-window -v -c "#{pane_current_path}"

# Navigate panes (no prefix)
bind -n S-Left select-pane -L
bind -n S-Right select-pane -R
bind -n S-Up select-pane -U
bind -n S-Down select-pane -D

# Resize panes
bind -r C-Left resize-pane -L 5
bind -r C-Right resize-pane -R 5
bind -r C-Up resize-pane -U 5
bind -r C-Down resize-pane -D 5

# New windows/panes retain current path
bind c new-window -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# в”Җв”Җ Gruvbox palette (regular, matches starship.toml) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
# bg0=#282828  bg1=#3c3836  bg3=#665c54  fg0=#fbf1c7
# red=#cc241d  green=#98971a  yellow=#d79921  blue=#458588
# aqua=#689d6a  orange=#d65d0e  purple=#b16286

# в”Җв”Җ Panes в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
setw -g pane-border-style "fg=#3c3836"
set -g pane-active-border-style "fg=#d65d0e"
set -g pane-border-lines double
set -g pane-border-indicators both
set -g display-panes-colour "#d65d0e"
set -g display-panes-active-colour "#d65d0e"

# Dim inactive panes вҖ” active pane stays normal brightness
set -g window-style "bg=#242424"
set -g window-active-style "bg=#282828"

# в”Җв”Җ Messages & mode в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
set -g message-style "fg=#fbf1c7,bg=#d79921,bold"
set -g message-command-style "fg=#fbf1c7,bg=#98971a,bold"
setw -g mode-style "fg=#fbf1c7,bg=#d79921,bold"
setw -g clock-mode-colour "#d65d0e"
setw -g clock-mode-style 24

# в”Җв”Җ Status bar в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
set -g status-style "fg=#fbf1c7,bg=#282828"
set -g status-left-length 80
set -g status-right-length 100

set -g status-left "#[fg=#d65d0e,bg=#282828]оӮ¶#[fg=#fbf1c7,bg=#d65d0e,bold] у°ҳ§ #[fg=#d65d0e,bg=#282828]оӮҙ "
set -g status-right "#[fg=#d79921,bg=#282828]оӮ¶#[fg=#fbf1c7,bg=#d79921] у°ғӯ %m/%d у°Ҙ” %R #[fg=#458588,bg=#d79921]оӮ¶#[fg=#fbf1c7,bg=#458588] у°Ғ№ #(pmset -g batt | grep -Eo '[0-9]+%%') #[fg=#d65d0e,bg=#458588]оӮ¶#[fg=#fbf1c7,bg=#d65d0e] пҖҮ #(whoami) #[fg=#d65d0e,bg=#282828]оӮҙ"

# в”Җв”Җ Window tabs (pills) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
setw -g window-status-separator ""
setw -g window-status-style "fg=#fbf1c7,bg=#282828"
setw -g window-status-current-style "fg=#fbf1c7,bg=#282828"
setw -g window-status-activity-style "fg=#d79921,bg=#282828,bold"
setw -g window-status-bell-style "fg=#cc241d,bg=#282828,bold"
setw -g window-status-last-style "fg=#458588,bg=#282828"

setw -g window-status-format " #[fg=#3c3836,bg=#282828]оӮ¶#[fg=#fbf1c7,bg=#3c3836] #I #[fg=#3c3836,bg=#665c54]оӮ°#[fg=#fbf1c7,bg=#665c54] #W #[fg=#665c54,bg=#282828]оӮҙ "
setw -g window-status-current-format " #[fg=#d65d0e,bg=#282828]оӮ¶#[fg=#fbf1c7,bg=#d65d0e,bold] #I #[fg=#d65d0e,bg=#689d6a]оӮ°#[fg=#fbf1c7,bg=#689d6a,bold] #W #[fg=#689d6a,bg=#282828]оӮҙ "
