# tmux.conf — Gruvbox theme with pill-shaped tabs
# No framework, no dependencies. Just tmux.

# ── Terminal ──────────────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
set -ga terminal-overrides ",xterm*:Tc"
set -s escape-time 10
set -g focus-events on
set -g set-titles on
set -g set-titles-string "#W"

# ── General ───────────────────────────────────────────────────────────
set -g history-limit 10000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g mouse on
set -g status-interval 15

# ── Prefix ────────────────────────────────────────────────────────────
set -g prefix C-b
set -g prefix2 C-a
bind C-b send-prefix
bind C-a send-prefix -2

# ── Copy mode ─────────────────────────────────────────────────────────
set -s copy-command "pbcopy"

# ── Key bindings ──────────────────────────────────────────────────────
bind r source-file ~/.tmux.conf \; display-message "Config reloaded!"

# Split panes with arrow keys
bind Left split-window -h -c "#{pane_current_path}" \; select-pane -L
bind Right split-window -h -c "#{pane_current_path}"
bind Up split-window -v -c "#{pane_current_path}" \; select-pane -U
bind Down split-window -v -c "#{pane_current_path}"

# Navigate panes (no prefix)
bind -n S-Left select-pane -L
bind -n S-Right select-pane -R
bind -n S-Up select-pane -U
bind -n S-Down select-pane -D

# Resize panes
bind -r C-Left resize-pane -L 5
bind -r C-Right resize-pane -R 5
bind -r C-Up resize-pane -U 5
bind -r C-Down resize-pane -D 5

# New windows/panes retain current path
bind c new-window -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# ── Gruvbox palette ──────────────────────────────────────────────────
# bg0=#282828  bg1=#3c3836  fg=#ebdbb2  gray=#928374
# red=#fb4934  green=#b8bb26  yellow=#fabd2f  blue=#83a598  orange=#fe8019

# ── Panes ─────────────────────────────────────────────────────────────
setw -g pane-border-style "fg=#3c3836"
set -g pane-active-border-style "fg=#fe8019"
set -g pane-border-lines double
set -g pane-border-indicators both
set -g display-panes-colour "#fe8019"
set -g display-panes-active-colour "#fe8019"

# Dim inactive panes — active pane stays normal brightness
set -g window-style "bg=#242424"
set -g window-active-style "bg=#282828"

# ── Messages & mode ──────────────────────────────────────────────────
set -g message-style "fg=#282828,bg=#fabd2f,bold"
set -g message-command-style "fg=#282828,bg=#b8bb26,bold"
setw -g mode-style "fg=#282828,bg=#fabd2f,bold"
setw -g clock-mode-colour "#fe8019"
setw -g clock-mode-style 24

# ── Status bar ────────────────────────────────────────────────────────
set -g status-style "fg=#ebdbb2,bg=#282828"
set -g status-left-length 80
set -g status-right-length 100

set -g status-left "#[fg=#fe8019,bg=#282828]#[fg=#282828,bg=#fe8019,bold] 󰘧 #[fg=#fe8019,bg=#fabd2f]#[fg=#282828,bg=#fabd2f] 󰥔 %R #[fg=#fabd2f,bg=#282828] "
set -g status-right "#[fg=#3c3836,bg=#282828]#[fg=#ebdbb2,bg=#3c3836] 󰅐 #(~/.config/tmux/uptime.sh) #[fg=#83a598,bg=#3c3836]#[fg=#282828,bg=#83a598] 󰁹 #(pmset -g batt | grep -Eo '[0-9]+%%') #[fg=#fe8019,bg=#83a598]#[fg=#282828,bg=#fe8019]  #(whoami) #[fg=#fe8019,bg=#282828]"

# ── Window tabs (pills) ──────────────────────────────────────────────
setw -g window-status-separator ""
setw -g window-status-style "fg=#ebdbb2,bg=#282828"
setw -g window-status-current-style "fg=#282828,bg=#282828"
setw -g window-status-activity-style "fg=#fabd2f,bg=#282828,bold"
setw -g window-status-bell-style "fg=#fb4934,bg=#282828,bold"
setw -g window-status-last-style "fg=#83a598,bg=#282828"

setw -g window-status-format " #[fg=#3c3836,bg=#282828]#[fg=#ebdbb2,bg=#3c3836] #I #[fg=#3c3836,bg=#504945]#[fg=#ebdbb2,bg=#504945] #W #[fg=#504945,bg=#282828] "
setw -g window-status-current-format " #[fg=#fe8019,bg=#282828]#[fg=#282828,bg=#fe8019,bold] #I #[fg=#fe8019,bg=#d65d0e]#[fg=#282828,bg=#d65d0e,bold] #W #[fg=#d65d0e,bg=#282828] "
